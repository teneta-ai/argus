spring:
  threads:
    virtual:
      enabled: true
  application:
    name: argus
  data:
    redis:
      url: ${SPRING_DATA_REDIS_URL:redis://localhost:6379}
  web:
    resources:
      add-mappings: ${argus.chat.enabled:false}

argus:
  webhook:
    jira:
      secret: ${ARGUS_JIRA_WEBHOOK_SECRET}
      deduplication-ttl-seconds: 3600

  hitl:
    slack:
      approval-timeout-minutes: 15
      channel-id: ${ARGUS_HITL_CHANNEL_ID}
      bot-token: ${ARGUS_SLACK_BOT_TOKEN}
      signing-secret: ${ARGUS_SLACK_SIGNING_SECRET}

  mcp:
    atlassian:
      url: ${ARGUS_MCP_ATLASSIAN_URL:https://mcp.atlassian.com/v1/mcp}
      email: ${ATLASSIAN_EMAIL}
      api-token: ${ATLASSIAN_API_TOKEN}
    grafana:
      url: ${ARGUS_MCP_GRAFANA_URL:http://localhost:8002}

  tools:
    allow-list:
      - agentType: VERSION_DRIFT
        toolName: jira_get_issue
        accessLevel: READ
        requiresHitl: false
      - agentType: VERSION_DRIFT
        toolName: jira_search_issues
        accessLevel: READ
        requiresHitl: false
      - agentType: VERSION_DRIFT
        toolName: grafana_search_dashboards
        accessLevel: READ
        requiresHitl: false
      - agentType: VERSION_DRIFT
        toolName: grafana_list_alert_rules
        accessLevel: READ
        requiresHitl: false
      - agentType: ALERT_NOISE
        toolName: grafana_list_alert_rules
        accessLevel: READ
        requiresHitl: false
      - agentType: ALERT_NOISE
        toolName: grafana_search_dashboards
        accessLevel: READ
        requiresHitl: false
      - agentType: ALERT_NOISE
        toolName: jira_create_issue
        accessLevel: READ_WRITE
        requiresHitl: true
      - agentType: VERSION_DRIFT
        toolName: get_current_time
        accessLevel: READ
        requiresHitl: false
      - agentType: ALERT_NOISE
        toolName: get_current_time
        accessLevel: READ
        requiresHitl: false

  sanitizer:
    max-chars:
      jira: 4000
      grafana: 1000
      webhook-payload: 2000

  chat:
    enabled: ${ARGUS_CHAT_ENABLED:false}

  schedule:
    version-drift: "0 0 8 * * MON-FRI"
    alert-noise: "0 0 */4 * * *"

langchain4j:
  google-ai-gemini:
    chat-model:
      api-key: ${GEMINI_API_KEY}
      model-name: gemini-1.5-pro
      max-output-tokens: 2048
      log-requests: ${LANGCHAIN4J_LOG_REQUESTS:false}
      log-responses: ${LANGCHAIN4J_LOG_RESPONSES:false}
