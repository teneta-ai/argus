<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Argus Chat</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f1117;
    color: #e1e4e8;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 16px 24px;
    border-bottom: 1px solid #21262d;
    background: #161b22;
  }

  header h1 {
    font-size: 18px;
    font-weight: 600;
    color: #f0f6fc;
  }

  header select {
    margin-left: auto;
    padding: 6px 12px;
    background: #21262d;
    color: #e1e4e8;
    border: 1px solid #30363d;
    border-radius: 6px;
    font-size: 14px;
    cursor: pointer;
  }

  header select:focus { outline: none; border-color: #58a6ff; }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #3fb950;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .msg {
    max-width: 720px;
    line-height: 1.6;
    font-size: 14px;
    padding: 12px 16px;
    border-radius: 12px;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg.user {
    align-self: flex-end;
    background: #1f6feb;
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .msg.agent {
    align-self: flex-start;
    background: #21262d;
    border: 1px solid #30363d;
    border-bottom-left-radius: 4px;
  }

  .msg.error {
    align-self: flex-start;
    background: #3d1117;
    border: 1px solid #f85149;
    color: #f85149;
  }

  .msg .label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
    opacity: 0.7;
  }

  .thinking {
    align-self: flex-start;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 16px;
    background: #21262d;
    border: 1px solid #30363d;
    border-radius: 12px;
    border-bottom-left-radius: 4px;
    font-size: 13px;
    color: #8b949e;
  }

  .thinking .dots span {
    animation: blink 1.4s infinite both;
    font-size: 18px;
  }
  .thinking .dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking .dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.2; }
    40% { opacity: 1; }
  }

  #input-area {
    padding: 16px 24px;
    border-top: 1px solid #21262d;
    background: #161b22;
  }

  #input-area form {
    display: flex;
    gap: 8px;
    max-width: 800px;
    margin: 0 auto;
  }

  #input-area textarea {
    flex: 1;
    padding: 10px 14px;
    background: #0d1117;
    color: #e1e4e8;
    border: 1px solid #30363d;
    border-radius: 8px;
    font-family: inherit;
    font-size: 14px;
    resize: none;
    min-height: 44px;
    max-height: 160px;
    line-height: 1.5;
  }

  #input-area textarea:focus { outline: none; border-color: #58a6ff; }
  #input-area textarea:disabled { opacity: 0.5; }

  #input-area button {
    padding: 10px 20px;
    background: #238636;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }

  #input-area button:hover { background: #2ea043; }
  #input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>

<header>
  <div class="status-dot"></div>
  <h1>Argus</h1>
  <select id="agent-select"></select>
</header>

<div id="messages"></div>

<div id="input-area">
  <form id="chat-form">
    <textarea id="message-input" placeholder="Ask an agent..." rows="1"></textarea>
    <button type="submit">Send</button>
  </form>
</div>

<script>
const messagesEl = document.getElementById('messages');
const form = document.getElementById('chat-form');
const input = document.getElementById('message-input');
const agentSelect = document.getElementById('agent-select');
const submitBtn = form.querySelector('button');

fetch('/api/chat/agents')
  .then(r => r.json())
  .then(agents => {
    agents.forEach(a => {
      const opt = document.createElement('option');
      opt.value = a.name;
      opt.textContent = a.description;
      agentSelect.appendChild(opt);
    });
  });

input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 160) + 'px';
});

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    form.dispatchEvent(new Event('submit'));
  }
});

form.addEventListener('submit', async e => {
  e.preventDefault();
  const message = input.value.trim();
  if (!message) return;

  const agentType = agentSelect.value;
  addMessage(message, 'user', 'You');
  input.value = '';
  input.style.height = 'auto';
  setLoading(true);

  const thinkingEl = addThinking(agentSelect.selectedOptions[0].textContent);

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ agentType, message })
    });
    const data = await res.json();
    thinkingEl.remove();

    if (res.ok) {
      addMessage(data.response, 'agent', agentSelect.selectedOptions[0].textContent);
    } else {
      addMessage(data.error || 'Unknown error', 'error', 'Error');
    }
  } catch (err) {
    thinkingEl.remove();
    addMessage('Network error: ' + err.message, 'error', 'Error');
  } finally {
    setLoading(false);
  }
});

function addMessage(text, type, label) {
  const div = document.createElement('div');
  div.className = 'msg ' + type;
  const labelEl = document.createElement('div');
  labelEl.className = 'label';
  labelEl.textContent = label;
  div.appendChild(labelEl);
  div.appendChild(document.createTextNode(text));
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

function addThinking(agentName) {
  const div = document.createElement('div');
  div.className = 'thinking';
  div.innerHTML = '<span class="dots"><span>.</span><span>.</span><span>.</span></span> ' +
    agentName + ' is thinking';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

function setLoading(loading) {
  input.disabled = loading;
  submitBtn.disabled = loading;
  if (!loading) input.focus();
}

input.focus();
</script>
</body>
</html>
